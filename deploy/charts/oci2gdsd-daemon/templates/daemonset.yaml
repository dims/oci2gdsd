apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "oci2gdsd-daemon.fullname" . }}
  labels:
{{ include "oci2gdsd-daemon.labels" . | indent 4 }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "oci2gdsd-daemon.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "oci2gdsd-daemon.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
{{- with .Values.podAnnotations }}
      annotations:
{{ toYaml . | indent 8 }}
{{- end }}
    spec:
      serviceAccountName: {{ include "oci2gdsd-daemon.serviceAccountName" . }}
{{- if .Values.daemon.runtimeClassName }}
      runtimeClassName: {{ .Values.daemon.runtimeClassName }}
{{- end }}
{{- with .Values.podSecurityContext }}
      securityContext:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.nodeSelector }}
      nodeSelector:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.affinity }}
      affinity:
{{ toYaml . | indent 8 }}
{{- end }}
{{- with .Values.tolerations }}
      tolerations:
{{ toYaml . | indent 8 }}
{{- end }}
      volumes:
      - name: oci2gdsd-root
        hostPath:
          path: {{ .Values.hostPaths.root }}
          type: {{ .Values.hostPaths.rootType }}
      - name: oci2gdsd-config
        configMap:
          name: {{ include "oci2gdsd-daemon.fullname" . }}-config
      - name: oci2gdsd-socket-dir
        hostPath:
          path: {{ .Values.hostPaths.socketDir }}
          type: {{ .Values.hostPaths.socketDirType }}
      - name: run-udev
        hostPath:
          path: {{ .Values.hostPaths.runUdev }}
          type: {{ .Values.hostPaths.runUdevType }}
      - name: host-dev
        hostPath:
          path: {{ .Values.hostPaths.dev }}
          type: {{ .Values.hostPaths.devType }}
      containers:
      - name: daemon
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command: ["oci2gdsd"]
        args:
        - --registry-config
        - /etc/oci2gdsd/config.yaml
        - serve
        - --unix-socket
        - {{ .Values.daemon.socketPath | quote }}
        - --socket-perms
        - {{ .Values.daemon.socketPerms | quote }}
{{- range .Values.daemon.extraArgs }}
        - {{ . | quote }}
{{- end }}
        securityContext:
          runAsUser: {{ .Values.securityContext.runAsUser }}
          runAsGroup: {{ .Values.securityContext.runAsGroup }}
          privileged: {{ .Values.securityContext.privileged }}
{{- with .Values.daemon.extraEnv }}
        env:
{{ toYaml . | indent 8 }}
{{- end }}
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -ec
            - test -S {{ .Values.daemon.socketPath | quote }}
          periodSeconds: 5
          failureThreshold: 12
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -ec
            - test -S {{ .Values.daemon.socketPath | quote }}
          periodSeconds: 10
          failureThreshold: 12
{{- with .Values.resources }}
        resources:
{{ toYaml . | indent 10 }}
{{- end }}
        volumeMounts:
        - name: oci2gdsd-root
          mountPath: {{ .Values.hostPaths.root }}
        - name: oci2gdsd-config
          mountPath: /etc/oci2gdsd
          readOnly: true
        - name: oci2gdsd-socket-dir
          mountPath: /run/oci2gdsd
        - name: run-udev
          mountPath: /run/udev
          readOnly: true
        - name: host-dev
          mountPath: /host-dev
          readOnly: true
