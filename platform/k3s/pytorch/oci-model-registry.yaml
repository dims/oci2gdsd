apiVersion: v1
kind: Namespace
metadata:
  name: oci-model-registry
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oci-model-registry
  namespace: oci-model-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oci-model-registry
  template:
    metadata:
      labels:
        app: oci-model-registry
    spec:
      tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "node-role.kubernetes.io/master"
        operator: "Exists"
        effect: "NoSchedule"
      containers:
      - name: registry
        image: registry:2
        imagePullPolicy: IfNotPresent
        env:
        - name: REGISTRY_STORAGE_DELETE_ENABLED
          value: "true"
        ports:
        - containerPort: 5000
          name: http
---
apiVersion: v1
kind: Service
metadata:
  name: oci-model-registry
  namespace: oci-model-registry
spec:
  selector:
    app: oci-model-registry
  ports:
  - name: http
    port: 5000
    targetPort: http
