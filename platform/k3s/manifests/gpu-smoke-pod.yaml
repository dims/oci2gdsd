apiVersion: v1
kind: Pod
metadata:
  name: gpu-smoke
  namespace: kube-system
spec:
  restartPolicy: Never
  runtimeClassName: nvidia
  tolerations:
  - key: "nvidia.com/gpu"
    operator: "Exists"
    effect: "NoSchedule"
  containers:
  - name: nvidia-smi
    image: nvcr.io/nvidia/cuda:12.8.0-base-ubuntu22.04
    imagePullPolicy: IfNotPresent
    command: ["nvidia-smi", "-L"]
    securityContext:
      privileged: true
    resources:
      limits:
        nvidia.com/gpu: 1
