root: /var/lib/oci2gdsd
model_root: /var/lib/oci2gdsd/models
tmp_root: /var/lib/oci2gdsd/tmp
locks_root: /var/lib/oci2gdsd/locks
journal_dir: /var/lib/oci2gdsd/journal
state_db: /var/lib/oci2gdsd/state.db
log_level: info  # RESERVED: accepted but not currently wired to logger behavior

registry:
  timeout_seconds: 30
  request_timeout_seconds: 30  # active: primary timeout for registry client
  retries: 5                   # RESERVED: not yet implemented
  backoff_initial_ms: 250      # RESERVED: not yet implemented
  backoff_max_ms: 8000         # RESERVED: not yet implemented
  auth:
    mode: docker-config        # RESERVED: only docker-config path is active
    docker_config_path: /etc/oci2gdsd/docker-config.json  # active

transfer:
  max_models_concurrent: 2             # RESERVED: not yet implemented
  max_shards_concurrent_per_model: 4   # validation-only: must be > 0
  max_connections_per_registry: 16     # RESERVED: not yet implemented
  stream_buffer_bytes: 4194304         # active: buffer for shard streaming writes
  max_resume_attempts: 2               # RESERVED: not yet implemented

download:
  max_concurrent_requests_global: 64    # RESERVED: not yet implemented
  max_concurrent_requests_per_model: 12 # RESERVED: not yet implemented
  max_concurrent_chunks_per_blob: 6     # RESERVED: not yet implemented (per-blob parallelism)
  chunk_size_bytes: 16777216            # RESERVED: not yet implemented (chunked range fetch)
  max_idle_conns: 256                   # active: HTTP transport tuning
  max_idle_conns_per_host: 128          # active: HTTP transport tuning
  max_conns_per_host: 128               # active: HTTP transport tuning
  request_timeout_sec: 300             # RESERVED: not yet implemented
  response_header_timeout_sec: 5       # active: HTTP transport tuning
  retry:
    max_retries: 8                     # active
    min_backoff_ms: 30                 # active
    max_backoff_ms: 300000             # active
    jitter: true                       # RESERVED: not yet implemented

integrity:
  strict_digest: true            # RESERVED: digest enforcement is always on in code
  strict_signature: true         # validation-only: cannot be true with allow_unsigned_in_dev
  allow_unsigned_in_dev: false   # validation-only: cannot be true with strict_signature

publish:
  require_ready_marker: true   # RESERVED: READY marker is always required in code
  fsync_files: true            # active: fsync each shard file after write
  fsync_directory: true        # active: fsync model directory after publish
  atomic_publish: true         # RESERVED: atomic rename is always used in code
  deny_partial_reads: true     # RESERVED: enforced via READY marker in code

retention:
  policy: lru_no_lease         # active: only supported policy
  min_free_bytes: 214748364800 # active: 200 GiB; used by ensure space guard and gc target
  max_models: 16               # RESERVED: not yet implemented
  ttl_hours: 168               # RESERVED: not yet implemented
  emergency_low_space_mode: true  # RESERVED: not yet implemented

observability:
  metrics_enabled: true                # RESERVED: no metrics endpoint wired yet
  metrics_listen: 127.0.0.1:9098      # RESERVED: no metrics endpoint wired yet
  events_json_log: true               # RESERVED: no event pipeline wired yet

# security:
#   model_id_allowlist_regex: "^[a-z0-9][a-z0-9._-]*$"  # active: optional model-id gate
