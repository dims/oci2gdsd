root: /var/lib/oci2gdsd
model_root: /var/lib/oci2gdsd/models
tmp_root: /var/lib/oci2gdsd/tmp
locks_root: /var/lib/oci2gdsd/locks
journal_dir: /var/lib/oci2gdsd/journal
state_db: /var/lib/oci2gdsd/state.db
log_level: info

registry:
  timeout_seconds: 30
  request_timeout_seconds: 30
  retries: 5
  backoff_initial_ms: 250
  backoff_max_ms: 8000
  auth:
    mode: docker-config
    docker_config_path: /etc/oci2gdsd/docker-config.json

transfer:
  max_models_concurrent: 2
  max_shards_concurrent_per_model: 4
  max_connections_per_registry: 16
  stream_buffer_bytes: 4194304
  max_resume_attempts: 2

download:
  max_concurrent_requests_global: 64
  max_concurrent_requests_per_model: 12
  max_concurrent_chunks_per_blob: 6
  chunk_size_bytes: 16777216
  max_idle_conns: 256
  max_idle_conns_per_host: 128
  max_conns_per_host: 128
  request_timeout_sec: 300
  response_header_timeout_sec: 5
  retry:
    max_retries: 8
    min_backoff_ms: 30
    max_backoff_ms: 300000
    jitter: true

integrity:
  strict_digest: true
  strict_signature: true
  allow_unsigned_in_dev: false

publish:
  require_ready_marker: true
  fsync_files: true
  fsync_directory: true
  atomic_publish: true
  deny_partial_reads: true

retention:
  policy: lru_no_lease
  min_free_bytes: 214748364800
  max_models: 16
  ttl_hours: 168
  emergency_low_space_mode: true

observability:
  metrics_enabled: true
  metrics_listen: 127.0.0.1:9098
  events_json_log: true
